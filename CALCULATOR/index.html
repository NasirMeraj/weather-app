<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Link Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css"/>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    <div class="calculator-container">
        <div class="calculator">
            <!-- input for display number -->
            <input type="text" disabled id="number-input"/>
            <!-- input for display result -->
            <input placeholder="ANS" type="text" disabled id="input-result"/>
            <div class="button">
                <div class="row">
                    <!-- For row1 (Operators) -->
                   <div onClick="handleButton(this)" class="col col-sm- cal-buttons">+</div>
                   <div onClick="handleButton(this)" class="col cal-buttons">-</div>
                   <div onClick="handleButton(this)" class="col cal-buttons">*</div>
                   <div onClick="handleButton(this)" class="col cal-buttons">/</div>
                </div>
                <div class="row">
                    <!-- For row2 (7,8,9)-->
                    <div onClick="handleButton(this)" class="col col-3 cal-buttons">7</div>
                    <div onClick="handleButton(this)" class="col col-3 cal-buttons">8</div>
                    <div onClick="handleButton(this)" class="col col-3 cal-buttons">9</div>
                </div>
                <div class="row">
                    <!-- For row3 (4,5,6)-->
                    <div onClick="handleButton(this)" class="col col-3 cal-buttons">4</div>
                    <div onClick="handleButton(this)" class="col col-3 cal-buttons">5</div>
                    <div onClick="handleButton(this)" class="col col-3 cal-buttons">6</div>

                </div>
                <div class="row">
                    <!-- For row4 (1,2,3) -->
                    <div onClick="handleButton(this)" class="col col-3 cal-buttons">1</div>
                    <div onClick="handleButton(this)" class="col col-3 cal-buttons">2</div>
                    <div onClick="handleButton(this)" class="col col-3 cal-buttons">3</div>
                </div>
                <div class="row">
                    <!-- for row5 (0 and Clear) -->
                    <div onClick="handleButton(this)" class="col col-4 cal-buttons">0</div>
                    <div onClick="reset()" class="col col-8 cal-buttons">Clear</div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <!-- Link Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
